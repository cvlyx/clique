kind = "web"
previewPath = "/"
title = "Migital - Digital Marketing Services"
version = "1.0.0"
id = "artifacts/migital"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21070

[services.development]
run = "pnpm --filter @workspace/migital run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/migital", "run", "build" ]
serve = "static"
publicDir = "artifacts/migital/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21070"
BASE_PATH = "/"
